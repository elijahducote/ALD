     <div class="container">
      <div class="wrapper tab-list" data-page="contact">
       <section id="contact" class="form-view">
        <div class="form-card">
         <h1>Interested?</h1>
         <p class="intro">We accept your business here.</p>
         <p class="small">We do not store any information, and only provide it for the contractor.</p>
         <form id="contact-form" action="/go/send-mail" method="POST" enctype="multipart/form-data" novalidate="true">
          <div class="form-row">
           <label for="name">Name</label>
           <input id="name" name="name" type="text" placeholder="Ex: Ashley, Evan, Herman, Louise..." required="true" autocomplete="name" autofocus="true" />
          </div>
          <div class="form-row">
           <label for="email">Email Address</label>
           <input id="email" name="email" type="email" placeholder="Ex: arborlifedesigns@gmail.com" required="true" autocomplete="email" />
          </div>
          <div class="form-row">
           <label for="location">Location for Job</label>
           <input id="location" name="location" type="text" placeholder="Ex: 1787 Botanical Boulevard, Houston, TX #77027" required="true" autocomplete="street-address" />
          </div>
          <div class="form-row">
           <label for="phone">Phone Number</label>
           <input id="phone" name="phone" type="tel" placeholder="Ex: +1 (000)-000-0000" required="true" minlength="10" autocomplete="tel" />
          </div>
          <div class="form-row">
           <label for="mail">Comments</label>
           <textarea id="mail" name="mail" placeholder="Ex: I request your services to install Christmas lights..." required="true" minlength="15" maxlength="3000" rows="5"></textarea>
          </div>
          <h-captcha class="h-captcha" site-key="a3524c06-9e6e-4856-a31b-98e565f80c78" theme="dark" size="compact" auto-render="true"></h-captcha>
          <input type="hidden" name="token" id="captcha-token" />
          <div class="form-subscribe">
           <input type="checkbox" id="subscribe" name="subscribe" checked="true" />
           <label for="subscribe" class="subscribe-label">Enroll for updates</label>
          </div>
          <p class="form-alt">
           Or alternatively, 
           <a class="text-link" href="sms:+1(281)-914-7788?body=Hello%2C%20I%20am%20interested%20in%20your%20services.">text us.</a>
          </p>
          <div class="form-actions">
           <button class="pill-btn" type="submit" id="submit" disabled="true">Deliver Message</button>
          </div>
          <div class="form-status" id="form-status"></div>
         </form>
        </div>
       </section>
